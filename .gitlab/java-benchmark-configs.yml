# Benchmarks run on master, merge queue, or when manually triggered.
.parallel_benchmark_rules: &parallel_benchmark_rules
  - if: '$POPULATE_CACHE'
    when: never
  - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'
    when: never
  - if: '$CI_COMMIT_BRANCH == "master"'
    when: on_success
    interruptible: false
  - if: '$CI_COMMIT_BRANCH =~ /^mq-working-branch-/'
    when: on_success
    interruptible: true
  - if: '$CI_COMMIT_BRANCH =~ /^gh-readonly-queue\//'
    when: on_success
    interruptible: true
  - when: manual
    interruptible: true
    allow_failure: true

# Startup benchmarks run on PRs as well
.parallel_startup_benchmark_rules: &parallel_startup_benchmark_rules
  - if: '$POPULATE_CACHE'
    when: never
  - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'
    when: never
  - if: '$CI_COMMIT_BRANCH == "master"'
    when: on_success
    interruptible: false
  - if: '$CI_COMMIT_BRANCH =~ /^mq-working-branch-/'
    when: on_success
    interruptible: true
  - if: '$CI_COMMIT_BRANCH =~ /^gh-readonly-queue\//'
    when: on_success
    interruptible: true
  - when: on_success
    interruptible: true
    allow_failure: true

linux-java-spring-petclinic-parallel:
  needs: ["publish-artifacts-to-s3"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always
      interruptible: false
    - when: manual
      allow_failure: true

linux-java-insecure-bank-load-parallel:
  needs: ["publish-artifacts-to-s3"]
  rules: *parallel_benchmark_rules

linux-java-spring-petclinic-load-parallel:
