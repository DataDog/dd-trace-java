import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

plugins {
  id "com.gradleup.shadow"
  id "dd-trace-java.profiling-ddprof-override"
}

apply from: "$rootDir/gradle/java.gradle"

// These classes are native-library loading and compatibility glue. Their meaningful coverage comes
// from profiler smoke tests; per-class Jacoco verification is not stable across CI JVM/OS splits.
excludedClassesCoverage += ['datadog.libs.ddprof.DdprofLibraryLoader*', 'com.datadoghq.profiler.TaskBlockBridge',]

def ddprofVersion = project.findProperty('ddprof.version')

dependencies {
  // This module provides the ddprof library as an api dependency
  // so that other modules can easily depend on it.
  implementation project.hasProperty('ddprof.jar') ? files(project.findProperty('ddprof.jar')) :
    ddprofVersion != null ? "com.datadoghq:ddprof:${ddprofVersion}" : libs.ddprof
  api project(':internal-api')
  api project(':dd-trace-api')
}

if (ddprofVersion?.endsWith('-SNAPSHOT')) {
  configurations.configureEach {
    resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
  }
}

tasks.named("shadowJar", ShadowJar) {
  dependencies deps.excludeShared
  exclude '**/*.debug'
  archiveClassifier = 'all'
  include {
    def rslt = false
    rslt |= it.path == 'datadog' || it.path == "com" || it.path == "com/datadog"
    || it.path.startsWith("datadog/") || it.path == "com/datadoghq" || it.path == "com/datadoghq/profiler"
    || it.path.startsWith("com/datadoghq/profiler")
    rslt |= it.path == "META-INF" || it.path == "META-INF/services" || it.path.startsWith("META-INF/services/") || it.path.startsWith("META-INF/native-libs/")
    rslt |= (it.path.contains("ddprof") && it.path.endsWith(".jar"))
    return rslt
  }
}

tasks.named("build") {
  dependsOn tasks.named("shadowJar")
}
