}

// ---------------------------------------------------------------------------
// SCA Reachability: downloads GHSA enrichments and generates sca_cves.json
// ---------------------------------------------------------------------------

def SCA_ENRICHMENTS_API =
  'https://api.github.com/repos/DataDog/sca-reachability-database/contents/enrichments'

// Opens an authenticated connection to a GitHub URL with consistent headers and timeouts.
// Throws GradleException on non-200 response — no fallback by design.
// Set GITHUB_TOKEN to raise the unauthenticated rate limit (60 req/hr → 5000 req/hr).
def githubConnect = { String url, String token ->
  def connection = (HttpURLConnection) new URL(url).openConnection()
  connection.setRequestProperty('Accept', 'application/vnd.github+json')
  connection.setRequestProperty('X-GitHub-Api-Version', '2022-11-28')
  if (token) {
    connection.setRequestProperty('Authorization', "Bearer ${token}")
  }
  connection.connectTimeout = 10_000
  connection.readTimeout = 30_000
  int code = connection.responseCode
  if (code != 200) {
    throw new GradleException(
    "GitHub API returned HTTP ${code} for ${url}.\n" +
    "Unauthenticated rate limit is 60 req/hr. Set GITHUB_TOKEN to raise it.")
  }
  connection
}

// Fetches a GitHub URL and parses the response body as JSON.
def githubFetch = { String url, String token ->
  def conn = githubConnect(url, token)
  try {
    new JsonSlurper().parse(conn.inputStream)
  } finally {
    conn.disconnect()
  }
}

// Fetches a GitHub URL and returns the raw response body as a String.
def githubFetchRaw = { String url, String token ->
  def conn = githubConnect(url, token)
  try {
    conn.inputStream.text
  } finally {
    conn.disconnect()
  }
}

tasks.register('generateScaCvesJson') {
  description = 'Downloads GHSA enrichments from sca-reachability-database and updates src/main/resources/sca_cves.json. ' +
    'Run with -PrefreshSca to force a refresh. ' +
    'sca_cves.json is committed to the repo so CI does not need network access to this private repo.'
  group = 'build'

  // Output lives in src/main/resources so it is versioned and picked up by processResources
  // without any extra wiring. CI builds use the committed copy; only maintainers who need
  // to update the database run this task (with -PrefreshSca or when the file is absent).
  def outputFile = file('src/main/resources/sca_cves.json')

  outputs.file(outputFile)
  onlyIf {
    project.hasProperty('refreshSca') || !outputFile.exists()
  }

  doLast {
    def token = System.getenv('GITHUB_TOKEN')

    logger.lifecycle('Fetching GHSA enrichment index from GitHub...')
    def fileList = githubFetch(SCA_ENRICHMENTS_API, token) as List
    def ghsaFiles = fileList.findAll { it.name?.endsWith('.json') && it.type == 'file' }
    logger.lifecycle("Found ${ghsaFiles.size()} enrichment files")

    def entries = []
    ghsaFiles.each { fileInfo ->
      def ghsaId = (fileInfo.name as String).replace('.json', '')
      def rawContent = githubFetchRaw(fileInfo.download_url as String, token)
      // Transformation is handled by GhsaEnrichmentParser (tested separately in buildSrc)
      entries.addAll(datadog.gradle.sca.GhsaEnrichmentParser.INSTANCE.parse(ghsaId, rawContent))
    }

    outputFile.text = JsonOutput.toJson([version: 1, entries: entries])
    logger.lifecycle("sca_cves.json: ${entries.size()} entries from ${ghsaFiles.size()} GHSA files")
    logger.lifecycle("Remember to commit src/main/resources/sca_cves.json after updating the database.")
  }
}

tasks.named("processResources", ProcessResources) {
  doLast {
    fileTree(dir: outputs.files.asPath, includes: ['**/*.json']).each {
      it.text = JsonOutput.toJson(new JsonSlurper().parse(it))
    }
  }
}

jmh {
  jmhVersion = libs.versions.jmh.get()
  duplicateClassesStrategy = DuplicatesStrategy.EXCLUDE
  jvmArgs = ['-Ddd.appsec.enabled=true -Xms64m -Xmx64m']
  failOnError = false
  forceGC = true
  if (project.hasProperty('jmhIncludes')) {
    includes = [project.jmhIncludes]
  }
}

tasks.named("jmhJar", Jar) {
  exclude 'org/slf4j/impl/**/*'
}

ext {
  minimumBranchCoverage = 0.6
  minimumInstructionCoverage = 0.8
  excludedClassesCoverage = [
    'com.datadog.appsec.config.AppSecConfigServiceImpl.AppSecConfigChangesListener',
    'com.datadog.appsec.ddwaf.WafInitialization',
    'com.datadog.appsec.ddwaf.WAFModule.WAFDataCallback',
    'com.datadog.appsec.config.AppSecModuleConfigurer.Reconfiguration',
    'com.datadog.appsec.report.*',
    'com.datadog.appsec.config.AppSecConfigServiceImpl.SubscribeFleetServiceRunnable.1',
    'com.datadog.appsec.util.StandardizedLogging',
    'com.datadog.appsec.util.AbortStartupException',
    'com.datadog.appsec.config.AppSecConfig.AppSecConfigV1',
    'com.datadog.appsec.config.AppSecConfig.AppSecConfigV2',
    'com.datadog.appsec.config.AppSecConfig.NumberJsonAdapter',
    'com.datadog.appsec.config.AppSecFeatures',
    'com.datadog.appsec.config.AppSecFeatures.Asm',
    'com.datadog.appsec.config.AppSecFeatures.ApiSecurity',
    'com.datadog.appsec.config.AppSecFeatures.AutoUserInstrum',
    'com.datadog.appsec.AppSecModule.AppSecModuleActivationException',
    'com.datadog.appsec.event.ReplaceableEventProducerService',
    'com.datadog.appsec.api.security.ApiSecuritySampler.NoOp',
  ]
  excludedClassesBranchCoverage = [
    'com.datadog.appsec.gateway.GatewayBridge',
    'com.datadog.appsec.event.data.Address',
    'com.datadog.appsec.config.CurrentAppSecConfig',
    // equals() / hashCode() are not well covered
    'com.datadog.appsec.config.AppSecConfig.Helper',
    // assert never fails
    'com.datadog.appsec.util.StandardizedLogging',
    'com.datadog.appsec.util.AbortStartupException',
  ]
  excludedClassesInstructionCoverage = ['com.datadog.appsec.report.ReportServiceImpl.TaskSchedulerImpl',]
}

tasks.withType(Test).configureEach {
  jvmArgs += ['-Ddd.appsec.enabled=true']
}

def rootDir = project.rootDir

spotless {
  java {
    target 'src/**/*.java'
  }
}
