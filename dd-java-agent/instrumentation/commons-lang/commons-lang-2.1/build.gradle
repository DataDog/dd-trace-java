plugins {
  id 'dd-trace-java.module.instrumentation'
  id 'dd-trace-java.call-site-instrumentation'
}

muzzle {
  pass {
    group = 'commons-lang'
    module = 'commons-lang'
    versions = '[2.1,]'
    assertInverse = true
  }
}

addTestSuiteForDir('latestDepTest', 'test')

dependencies {
  compileOnly group: 'commons-lang', name: 'commons-lang', version: '2.1'

  testImplementation group: 'commons-lang', name: 'commons-lang', version: '2.1'

  testRuntimeOnly project(':dd-java-agent:instrumentation:datadog:asm:iast-instrumenter')

  latestDepTestImplementation group: 'commons-lang', name: 'commons-lang', version: '2.6'
}
