apply from: "$rootDir/gradle/java.gradle"

testJvmConstraints {
  // vertx-web doesn't support Java 17 until v4.2
  maxJavaVersion = JavaVersion.VERSION_15
}

muzzle {
  pass {
    group = 'io.vertx'
    module = "vertx-web"
    versions = "[4.0.0,5)"
  }
  fail {
    group = 'io.vertx'
    module = "vertx-web"
    versions = "(,4.0.0)"
  }
}

addTestSuiteForDir('latestDepTest', 'latestDepTest')
addTestSuiteExtendingForDir('latestDepForkedTest', 'latestDepTest', 'latestDepTest')

configurations {
  testArtifacts
}

// Create test artifacts so vertx-rx can reuse the server test instrumentation and base class
artifacts {
  testArtifacts testJar
}

dependencies {
  api project(':dd-java-agent:instrumentation:netty:netty-common')

  compileOnly group: 'io.vertx', name: 'vertx-web', version: '4.0.0'

  testImplementation project(':dd-java-agent:instrumentation:netty:netty-4.1')
  testImplementation project(':dd-java-agent:instrumentation:datadog:tracing:trace-annotation')
  testImplementation project(':dd-java-agent:agent-iast:iast-test-fixtures')
  testRuntimeOnly project(':dd-java-agent:instrumentation:datadog:asm:iast-instrumenter')

  testImplementation group: 'io.vertx', name: 'vertx-web', version: '4.0.0'
  testImplementation group: 'io.vertx', name: 'vertx-web-client', version: '4.0.0'

  testImplementation project(':dd-java-agent:appsec:appsec-test-fixtures')

  // Make JUnit Jupiter API explicit for the Java JUnit 5 tests in this module
  // (RouteHandlerExceptionHandlerTest). The shared gradle/java_deps.gradle only
  // declares JUnit 5 as testRuntimeOnly; otherwise we'd be relying on Spock 2.x's
  // transitive junit-jupiter-api on testCompileClasspath, which is implicit and
  // brittle.
  testImplementation libs.junit.jupiter

  testRuntimeOnly project(':dd-java-agent:instrumentation:jackson-core:jackson-core-common')
  testRuntimeOnly project(':dd-java-agent:instrumentation:netty:netty-buffer-4.0')

  latestDepTestImplementation group: 'io.vertx', name: 'vertx-web', version: '4.+'
  latestDepTestImplementation group: 'io.vertx', name: 'vertx-web-client', version: '4.+'
}

["compileLatestDepTestJava", "compileLatestDepForkedTestJava"].each { name ->
  tasks.named(name, JavaCompile) {
    configureCompiler(it, 11)
  }
}
["compileLatestDepForkedTestGroovy", "compileLatestDepTestGroovy"].each {
  tasks.named(it, GroovyCompile) {
    configureCompiler(it, 11)
  }
}

tasks.named("latestDepTest", Test) {
  testJvmConstraints {
    minJavaVersion = JavaVersion.VERSION_11
    maxJavaVersion = JavaVersion.VERSION_25
  }
}

tasks.named("latestDepForkedTest", Test) {
  testJvmConstraints {
    minJavaVersion = JavaVersion.VERSION_11
    maxJavaVersion = JavaVersion.VERSION_25
  }
}

