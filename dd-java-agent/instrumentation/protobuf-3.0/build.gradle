import static datadog.gradle.plugin.BuildPlatformExtensionsKt.isLinuxArm64
import static datadog.gradle.plugin.BuildPlatformExtensionsKt.isMacArm64

plugins {
  id 'com.google.protobuf' version '0.10.0'
}

apply from: "$rootDir/gradle/java.gradle"

muzzle {
  pass {
    group = "com.google.protobuf"
    module = "protobuf-java"
    versions = "[2.0.0,)"
    skipVersions = ["2.0.1", "2.0.3", "2.1.0", "2.2.0", "2.3.0", "2.4.0a", "2.4.1"]
    assertInverse = true
  }
}


protobuf {
  protoc {
    // There is no macOS arm64 support for protoc 3.0.0, so require Rosetta.
    if (isMacArm64(project)) {
      artifact = "com.google.protobuf:protoc:3.0.0:osx-x86_64"
    } else {
      artifact = "com.google.protobuf:protoc:3.0.0"
    }
  }
}

// TODO: protobuf supports Linux arm64 since `3.12.0`, but it is not source-compatible with 3.0.0
if (isLinuxArm64(project)) {
  tasks.matching {
    it.name in [
      "extractTestProto",
      "generateTestProto",
      "compileTestJava",
      "compileTestGroovy",
      "processTestResources",
      "testClasses",
      "test"
    ]
  }.configureEach {
    enabled = false
  }
}


dependencies {
  compileOnly group: 'com.google.protobuf', name: 'protobuf-java', version: '3.0.0'
  testImplementation group: 'com.google.protobuf', name: 'protobuf-java', version: '3.0.0'
}
