plugins {
  id 'com.google.protobuf' version '0.9.4'
}

apply from: "$rootDir/gradle/java.gradle"

muzzle {
  pass {
    group = "com.google.protobuf"
    module = "protobuf-java"
    versions = "[2.0.0,)"
    skipVersions = ["2.0.1", "2.0.3", "2.1.0", "2.2.0", "2.3.0", "2.4.0a", "2.4.1"]
    assertInverse = true
  }
}

def os = System.getProperty("os.name").toLowerCase()
def arch = System.getProperty("os.arch").toLowerCase()
def arm64 = arch.contains("aarch64") || arch.contains("arm64")
def skipLinuxArm64Tests = os.contains("linux") && arm64

protobuf {
  protoc {
    // There is no macOS arm64 support for protoc 3.0.0, so require Rosetta.
    if (os.contains("mac") && arm64) {
      artifact = "com.google.protobuf:protoc:3.0.0:osx-x86_64"
    } else {
      artifact = "com.google.protobuf:protoc:3.0.0"
    }
  }
}

// TODO: protobuf supports arm64 linux since 3.12.0, but it is not source-compatible with 3.0.0
if (skipLinuxArm64Tests) {
  tasks.matching {
    it.name in [
      "extractTestProto",
      "generateTestProto",
      "compileTestJava",
      "compileTestGroovy",
      "processTestResources",
      "testClasses",
      "test"
    ]
  }.configureEach {
    enabled = false
  }
}


dependencies {
  compileOnly group: 'com.google.protobuf', name: 'protobuf-java', version: '3.0.0'
  testImplementation group: 'com.google.protobuf', name: 'protobuf-java', version: '3.0.0'
}

sourceSets {
  test {
    java {
      srcDir "$buildDir/generated/source/proto/test/java"
    }
  }
}
