import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar

plugins {
  id 'java-test-fixtures'
}

muzzle {
  pass {
    group = "jakarta.servlet"
    module = 'jakarta.servlet-api'
    versions = "[5.0.0,)"
  }
}

apply from: "$rootDir/gradle/java.gradle"
apply plugin: 'dd-trace-java.call-site-instrumentation'

// jakarta.servlet-api dependencies are compiled with Java 11 and
// the gradle muzzle tasks uses the JVM gradle is running with
if (!JavaVersion.current().java11Compatible) {
  project.afterEvaluate {
    tasks.findAll {it.group == 'Muzzle' }.each {
      logger.info("Disabling task $it.path (requires Java 11)")
      it.enabled = false
    }
  }
}

configurations {
  javaxClassesToRelocate
}

def relocatedJavaxJar = tasks.register('relocatedJavaxJar', ShadowJar) {
  relocate 'javax.servlet', 'jakarta.servlet'
  relocate 'datadog.trace.instrumentation.servlet3', 'datadog.trace.instrumentation.servlet5'
  relocate 'datadog.trace.instrumentation.servlet', 'datadog.trace.instrumentation.servlet5'

  archiveClassifier.set('relocated-javax')

  configurations.add(project.configurations.named('javaxClassesToRelocate'))

  include '**/*.jar'
  include '**/Servlet31InputStreamWrapper.class'
  include '**/HttpServletGetInputStreamAdvice.class'
  include '**/HttpServletGetReaderAdvice.class'
  include '**/BufferedReaderWrapper.class'
  include '**/ServletBlockingHelper.class'
  include '**/AbstractServletInputStreamWrapper.class'

  includeEmptyDirs = false
}
def relocatedJavaxJarFile = relocatedJavaxJar.flatMap { it.archiveFile }

dependencies {
  // Wire the relocated javax->jakarta advice into this project without publishing
  // the relocated jar as runtime output:
  //
  // - keep the relocated jar visible to main compilation through `compileOnly`
  // - keep the relocated jar visible to tests through `testImplementation`
  // - include the relocated classes into this project's jar (jar task config)
  //
  // NOTE:
  // Do not add the relocated jar to `implementation`: `runtimeElements` publishes
  // both the jar artifact and runtime dependencies derived from `implementation`.
  // Publishing the relocated jar there would expose the same servlet5 advice classes
  // twice to downstream projects, once from the module jar and once from the
  // relocated jar.
  compileOnly files(relocatedJavaxJarFile)
  testImplementation files(relocatedJavaxJarFile)
  compileOnly group: 'jakarta.servlet', name: 'jakarta.servlet-api', version: '5.0.0'
  testImplementation group: 'jakarta.servlet', name: 'jakarta.servlet-api', version: '5.0.0'
  testImplementation group: 'jakarta.servlet.jsp', name: 'jakarta.servlet.jsp-api', version: '3.0.0'
  testRuntimeOnly project(':dd-java-agent:instrumentation:datadog:asm:iast-instrumenter')

  javaxClassesToRelocate project(':dd-java-agent:instrumentation:servlet:javax-servlet:javax-servlet-iast'), {
    transitive = false
  }
  javaxClassesToRelocate project(':dd-java-agent:instrumentation:servlet:javax-servlet:javax-servlet-3.0'), {
    transitive = false
  }

  testFixturesApi(project(':dd-java-agent:instrumentation-testing')) {
    exclude group: 'org.eclipse.jetty', module: 'jetty-server'
  }
  testFixturesCompileOnly group: 'jakarta.servlet', name: 'jakarta.servlet-api', version: '5.0.0'

  testFixturesCompileOnly(libs.bundles.groovy)
  testFixturesCompileOnly(libs.bundles.spock)

  // tested on tomcat-5.5:latestDepTest
}

tasks.named("jar", Jar) {
  from zipTree(relocatedJavaxJarFile)
}
