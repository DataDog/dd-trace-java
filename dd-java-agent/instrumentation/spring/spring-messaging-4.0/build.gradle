import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.dsl.KotlinVersion

plugins {
  id 'org.jetbrains.kotlin.jvm'
}

muzzle {
  pass {
    group = 'org.springframework'
    module = 'spring-messaging'
    versions = "[4.0.0.RELEASE,)"
    assertInverse = true
    // KotlinAwareHandlerInstrumentation references Publisher from reactive-streams,
    // which is not bundled in spring-messaging but is always present when Spring Kafka is.
    extraDependency 'org.reactivestreams:reactive-streams:1.0.4'
  }
}

apply from: "$rootDir/gradle/java.gradle"
apply from: "$rootDir/gradle/test-with-kotlin.gradle"

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_17
}

addTestSuiteForDir('latestDepTest', 'test')

["compileTestGroovy", "compileLatestDepTestGroovy"].each { name ->
  def kotlinTaskName = name.replace("Groovy", "Kotlin")
  tasks.named(name, GroovyCompile) {
    configureCompiler(it, 17)
    classpath += files(tasks.named(kotlinTaskName).map { it.destinationDirectory })
  }
}

kotlin {
  compilerOptions {
    jvmTarget = JvmTarget.JVM_1_8
    apiVersion = KotlinVersion.KOTLIN_1_9
    languageVersion = KotlinVersion.KOTLIN_1_9
  }
}

dependencies {
  compileOnly group: 'org.springframework', name: 'spring-messaging', version: '4.0.0.RELEASE'
  compileOnly 'org.reactivestreams:reactive-streams:1.0.4'
  testImplementation project(':dd-java-agent:instrumentation:aws-java:aws-java-common')

  // capture SQS send and receive spans, propagate trace details in messages
  testImplementation project(':dd-java-agent:instrumentation:apache-httpclient:apache-httpclient-4.0')
  testImplementation project(':dd-java-agent:instrumentation:aws-java:aws-java-sdk-2.2')
  testImplementation project(':dd-java-agent:instrumentation:aws-java:aws-java-sqs-2.0')

  testImplementation group: 'jakarta.annotation', name: 'jakarta.annotation-api', version: '2.0.0'
  testImplementation group: 'io.awspring.cloud', name: 'spring-cloud-aws-sqs', version: '3.0.1', {
    exclude group: 'org.slf4j', module: 'slf4j-api'
  }
  testImplementation group: 'org.elasticmq', name: 'elasticmq-rest-sqs_2.13', version: '1.2.3'

  // Spring Kafka + embedded Kafka broker for coroutine tests
  testImplementation group: 'org.springframework.kafka', name: 'spring-kafka', version: '3.3.4', {
    exclude group: 'org.apache.kafka'
  }
  testImplementation group: 'org.springframework.kafka', name: 'spring-kafka-test', version: '3.3.4', {
    exclude group: 'org.apache.kafka'
  }

  // KotlinAwareHandlerInstrumentation relies on the reactive-streams and reactor instrumentation
  testImplementation project(':dd-java-agent:instrumentation:reactive-streams-1.0')
  testImplementation project(':dd-java-agent:instrumentation:reactor-core-3.1')

  testImplementation 'org.apache.kafka:kafka-server-common:3.8.0:test'
  testImplementation 'org.apache.kafka:kafka-clients:3.8.0'
  testImplementation 'org.apache.kafka:kafka-clients:3.8.0:test'
  testImplementation 'org.apache.kafka:kafka_2.13:3.8.0'
  testImplementation 'org.apache.kafka:kafka_2.13:3.8.0:test'

  testImplementation libs.kotlin
  testImplementation "org.jetbrains.kotlin:kotlin-reflect"
  testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-core-jvm:1.8.+"
  testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-reactor:1.8.+"
  testImplementation "io.projectreactor:reactor-core:3.+"

  testRuntimeOnly project(':dd-java-agent:instrumentation:kotlin-coroutines-1.3')
  testRuntimeOnly project(':dd-java-agent:instrumentation:kafka:kafka-clients-3.8')

  latestDepTestImplementation group: 'org.springframework', name: 'spring-messaging', version: '7.+', {
    exclude group: 'org.slf4j', module: 'slf4j-api'
  }

  // Spring Kafka 4.0.x is the Spring Boot 4 line; it requires Spring Framework 7 and manages
  // kafka-clients 4.1.x. Pin to the 4.0 GA line (not 4.+, which floats to 4.1.0-RC1) so the
  // kafka-clients version below stays in lockstep with what spring-kafka-test was built against.
  // Override the Boot-3 floor (3.3.4 / kafka-clients 3.8.0) only on the latestDep classpath.
  latestDepTestImplementation group: 'org.springframework.kafka', name: 'spring-kafka', version: '4.0.+', {
    exclude group: 'org.apache.kafka'
  }
  latestDepTestImplementation group: 'org.springframework.kafka', name: 'spring-kafka-test', version: '4.0.+', {
    exclude group: 'org.apache.kafka'
  }

  // Match the kafka-clients line managed by spring-kafka 4.0.x (4.1.x); 4.+ floats to 4.3.0,
  // whose KafkaClusterTestKit API differs from what spring-kafka-test 4.0.x expects.
  latestDepTestImplementation 'org.apache.kafka:kafka-server-common:4.1.+:test'
  latestDepTestImplementation 'org.apache.kafka:kafka-clients:4.1.+'
  latestDepTestImplementation 'org.apache.kafka:kafka-clients:4.1.+:test'
  latestDepTestImplementation 'org.apache.kafka:kafka_2.13:4.1.+'
  latestDepTestImplementation 'org.apache.kafka:kafka_2.13:4.1.+:test'
  // Kafka 4.x moved KafkaClusterTestKit (used by EmbeddedKafkaKraftBroker) into
  // the kafka-test-common-runtime artifact; spring-kafka-test pulls it transitively
  // but we exclude org.apache.kafka above, so declare it explicitly.
  latestDepTestImplementation 'org.apache.kafka:kafka-test-common-runtime:4.1.+'

  // spring-cloud-aws-sqs 3.0.1 (floor) targets Spring Framework 6; the 4.x line is the
  // Spring Framework 7 / Boot 4 compatible release required once spring-messaging is bumped to 7.x.
  latestDepTestImplementation group: 'io.awspring.cloud', name: 'spring-cloud-aws-sqs', version: '4.+', {
    exclude group: 'org.slf4j', module: 'slf4j-api'
  }
  // spring-cloud-aws-sqs 4.x ships an AWS SDK that defaults to the SQS JSON wire protocol;
  // elasticmq only learned that protocol in the 1.6.x line (1.2.3 floor returns HTTP 400).
  latestDepTestImplementation group: 'org.elasticmq', name: 'elasticmq-rest-sqs_2.13', version: '1.6.+'
}
