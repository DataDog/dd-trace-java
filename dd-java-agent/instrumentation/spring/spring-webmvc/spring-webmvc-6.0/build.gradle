muzzle {
  pass {
    group = 'org.springframework'
    module = 'spring-webmvc'
    versions = "[6,)"
    javaVersion = "17"
    extraDependency "jakarta.servlet:jakarta.servlet-api:5.0.0"
  }
}

apply from: "$rootDir/gradle/java.gradle"

tracerJava {
  addSourceSetFor(JavaVersion.VERSION_17)
}

addTestSuiteForDir("latestDepTest", "test")
addTestSuiteForDir("latestDepBoot3Test", "test")

[
  "compileMain_java17Java",
  "compileTestJava",
  "compileLatestDepTestJava",
  "compileLatestDepBoot3TestJava"
].each {
  tasks.named(it, JavaCompile) {
    configureCompiler(it, 17, JavaVersion.VERSION_1_8)
  }
}

tasks.withType(GroovyCompile).configureEach {
  configureCompiler(it, 17)
  groovyOptions.setParameters(true)
}

dependencies {
  main_java17CompileOnly(group: 'org.springframework', name: 'spring-webmvc', version: '6.0.0')
  main_java17CompileOnly group: 'jakarta.servlet', name: 'jakarta.servlet-api', version: '5.0.0'

  implementation project(':dd-java-agent:instrumentation:datadog:dynamic-instrumentation:span-origin')
  main_java17Implementation project(':dd-java-agent:instrumentation:datadog:dynamic-instrumentation:span-origin')

  testImplementation(project(':dd-java-agent:instrumentation-testing')) {
    exclude(module: 'jetty-server') // incompatible servlet api
  }

  testImplementation project(':dd-java-agent:instrumentation:spring:spring-webmvc:spring-webmvc-3.1')
  testImplementation project(':dd-java-agent:instrumentation:spring:spring-webmvc:spring-webmvc-5.3')
  testRuntimeOnly project(':dd-java-agent:instrumentation:tomcat:tomcat-5.5')
  testRuntimeOnly project(':dd-java-agent:instrumentation:tomcat:tomcat-appsec:tomcat-appsec-6.0')
  testRuntimeOnly project(':dd-java-agent:instrumentation:tomcat:tomcat-appsec:tomcat-appsec-7.0')
  testRuntimeOnly project(':dd-java-agent:instrumentation:websocket:javax-websocket-1.0')
  testRuntimeOnly project(':dd-java-agent:instrumentation:websocket:jakarta-websocket-2.0')
  testImplementation project(':dd-java-agent:instrumentation:servlet:jakarta-servlet-5.0')

  testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-test', version: '3.0.0'
  testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-web', version: '3.0.0'
  testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-security', version: '3.0.0'
  testImplementation group: 'org.springframework', name: 'spring-websocket', version: '6.0.2'
  testImplementation group: 'com.google.code.gson', name: 'gson', version: '+'

  testImplementation(libs.spock.spring)

  latestDepTestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-test', version: '4.+'
  latestDepTestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-web', version: '4.+'
  latestDepTestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-security', version: '4.+'
  latestDepTestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-websocket', version: '4.+'

  latestDepBoot3TestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-test', version: '3.+'
  latestDepBoot3TestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-web', version: '3.+'
  latestDepBoot3TestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-security', version: '3.+'
  latestDepBoot3TestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-websocket', version: '3.+'
}

// latestDepBoot3Test uses Spring Boot 3.+ (latest Boot 3) — same behavior expectations as latestDepTest
tasks.named("latestDepBoot3Test", Test) {
  jvmArgs '-Dtest.dd.latestDepTest=true'
}

// Spring Boot 4 pulls JUnit 6 (platform 6.x) transitively via spring-boot-starter-test, but the test harness
// uses junit-platform-launcher 1.x. Force all JUnit artifacts back to the JUnit 5 versions used project-wide.
configurations.latestDepTestRuntimeClasspath {
  resolutionStrategy.eachDependency { details ->
    if (details.requested.group == 'org.junit.jupiter') {
      details.useVersion('5.14.1')
    } else if (details.requested.group == 'org.junit.platform' && details.requested.name != 'junit-platform-launcher') {
      details.useVersion('1.14.1')
    }
  }
}
