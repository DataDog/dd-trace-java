// This file includes software developed at SignalFx

muzzle {
  // We have two independent covariants, so we have to test them independently.
  pass {
    group = 'org.springframework.data'
    module = 'spring-data-commons'
    versions = "[3.0.0.RELEASE,)"
    javaVersion = "17"
    extraDependency "org.springframework:spring-aop:6.0.0"
    assertInverse = true
  }

  pass {
    group = 'org.springframework'
    module = 'spring-aop'
    versions = "[6,)"
    javaVersion = "17"
    extraDependency "org.springframework.data:spring-data-commons:3.0.0"
    assertInverse = true
    skipFromReport = true
  }
}

apply from: "$rootDir/gradle/java.gradle"

tracerJava {
  addSourceSetFor(JavaVersion.VERSION_17)
}

addTestSuiteForDir('latestDepTest', 'test')

["compileMain_java17Java", "compileTestJava", "compileLatestDepTestJava"].each {
  tasks.named(it, JavaCompile) {
    configureCompiler(it, 17, JavaVersion.VERSION_1_8)
  }
}

dependencies {
  main_java17CompileOnly group: 'org.springframework.data', name: 'spring-data-commons', version: '3.0.0'
  main_java17CompileOnly group: 'org.springframework', name: 'spring-aop', version: '6.0.0'
  implementation project(':dd-java-agent:agent-debugger:debugger-bootstrap')
  main_java17Implementation project(':dd-java-agent:agent-debugger:debugger-bootstrap')

  // JPA dependencies (Spring Boot 3 / Spring Data 3 / Hibernate 6 / jakarta.persistence)
  testImplementation project(':dd-java-agent:instrumentation:jdbc')
  testImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-data-jpa', version: '3.0.0'
  testImplementation group: 'org.hsqldb', name: 'hsqldb', version: '2.7.1'

  latestDepTestImplementation group: 'org.springframework.data', name: 'spring-data-commons', version: '4.+'
  latestDepTestImplementation group: 'org.springframework.boot', name: 'spring-boot-starter-data-jpa', version: '4.+'
}
