plugins {
  id 'idea'
}

ext {
  minJavaVersionForTests = JavaVersion.VERSION_11
}

apply from: "$rootDir/gradle/java.gradle"
apply plugin: 'call-site-instrumentation'

muzzle {
  pass {
    coreJdk()
  }
}

idea {
  module {
    jdkName = '11'
  }
}

csi {
  javaVersion = JavaLanguageVersion.of(11)
}

addTestSuiteForDir('latestDepTest', 'test')

dependencies {
  testRuntimeOnly project(':dd-java-agent:instrumentation:iast-instrumenter')
}

project.tasks.withType(AbstractCompile).configureEach {
  switch (it.name) {
    case 'compileCsiJava':
      configureCompiler(it, 11, JavaVersion.VERSION_1_8)
      break
    default:
      configureCompiler(it, 11)
  }
  // // TODO look at this config when refactoring configureCompiler
  //
  // configureCompiler(it, 11, true)
  // if (it.name != 'compileCsiJava') {
  //   sourceCompatibility = JavaVersion.VERSION_11
  //   targetCompatibility = JavaVersion.VERSION_11
  //   if (it instanceof JavaCompile) {
  //     it.options.release.set(11)
  //   }
  // }
}
