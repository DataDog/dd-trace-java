plugins {
  id 'dd-trace-java.module.instrumentation'
  id 'dd-trace-java.call-site-instrumentation'
}

muzzle {
  pass {
    group = 'org.unbescape'
    module = 'unbescape'
    versions = '[1.1.0.RELEASE,]'
    assertInverse = true
  }
}

addTestSuiteForDir('latestDepTest', 'test')

dependencies {
  compileOnly group: 'org.unbescape', name: 'unbescape', version: '1.1.0.RELEASE'

  testImplementation group: 'org.unbescape', name: 'unbescape', version: '1.1.0.RELEASE'

  testRuntimeOnly project(':dd-java-agent:instrumentation:datadog:asm:iast-instrumenter')

  latestDepTestImplementation group: 'org.unbescape', name: 'unbescape', version: '+'
}
