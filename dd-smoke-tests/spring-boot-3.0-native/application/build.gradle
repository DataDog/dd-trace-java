plugins {
  id 'java'
  id 'org.springframework.boot' version '3.0.0'
  id 'io.spring.dependency-management' version '1.0.14.RELEASE'
  id 'org.graalvm.buildtools.native' version '0.9.28'
}

def sharedRootDir = "$rootDir/../../../"
def sharedConfigDirectory = "$sharedRootDir/gradle"
rootProject.ext.sharedConfigDirectory = sharedConfigDirectory

apply from: "$sharedConfigDirectory/repositories.gradle"

ext.withProfiler = hasProperty('profiler')

// Avoid unlimited CPU usage on CI.
def isCI = providers.environmentVariable("CI").isPresent()
def ciBuildCpuCount = providers.environmentVariable("KUBERNETES_POD_CPU_REQUEST").getOrElse("4")

if (hasProperty('appBuildDir')) {
  buildDir = property('appBuildDir')
}

// Spring Boot 3.0's bundled ASM 9.4 only parses class files up to major 64 (Java 20), so
// target release 17 here regardless of the daemon JDK — keeps the inner app's class files
// at major 61 and avoids needing a separate Java 17 toolchain for the nested build.
tasks.withType(JavaCompile).configureEach {
  options.release = 17
}

dependencies {
  implementation 'org.springframework.boot:spring-boot-starter-web'
  if (hasProperty('apiJar')) {
    implementation files(property('apiJar'))
  } else {
    implementation "com.datadoghq:dd-trace-api:1.2.0"
  }
}

if (hasProperty('agentPath')) {
  final agentPath = property('agentPath')
  graalvmNative {
    binaries {
      main {
        // quick build mode, enough for smoke test
        buildArgs.add("-Ob")
        buildArgs.add("-J-javaagent:$agentPath")
        buildArgs.add("-J-Dnet.bytebuddy.safe=false")
        if (withProfiler && property('profiler') == 'true') {
          buildArgs.add("-J-Ddd.profiling.enabled=true")
          buildArgs.add("-J-Ddd.profiling.scrub.enabled=true")
          buildArgs.add("-J-Ddd.profiling.start-force-first=true")
        }
        if (isCI) {
          buildArgs.add("-H:NumberOfThreads=$ciBuildCpuCount")
          buildArgs.add("-J-XX:ActiveProcessorCount=$ciBuildCpuCount")
        }
        jvmArgs.add("-Xmx4096M")
      }
    }
  }
  tasks.named('nativeCompile') {
    inputs.file(agentPath).withPropertyName('agentJar')
  }
}
