import java.util.concurrent.Callable
import java.util.regex.Pattern

plugins {
  id 'dd-trace-java.smoke-test-app'
}

apply from: "$rootDir/gradle/java.gradle"

description = 'Spring Boot 3.0 Native Smoke Tests.'

dependencies {
  testImplementation project(':dd-smoke-tests')
  testImplementation libs.bundles.jmc
}

// The nested build compiles the application with `--release 17`, so Spring Boot 3.0's
// build-time classpath scanners don't see class files from the selected GraalVM release.
testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_17
  nativeImageCapable = true
}

// The following makes `springNativeBuild` only run when Gradle is passed `-PtestJvm=graalvm17` or later.
def testJvm = gradle.startParameter.projectProperties.getOrDefault('testJvm', '')
def graalvmMatcher = Pattern.compile("graalvm([0-9]+)").matcher(testJvm?.toLowerCase(Locale.ROOT) ?: '')
def testGraalvmVersion = graalvmMatcher.find() ? Integer.parseInt(graalvmMatcher.group(1)) : -1
def isSupportedGraalvm = testGraalvmVersion >= 17
Provider<String> graalvmHome = providers.provider({
  if (!isSupportedGraalvm) {
    throw new GradleException("Set -PtestJvm=graalvm<N> (N >= 17) to build the native image for this smoke test.")
  }
  getLazyJavaHomeFor(testGraalvmVersion, true).toString()
} as Callable<String>)

smokeTestApp {
  gradleApp {
    taskName = 'springNativeBuild'
    nestedTasks = ['nativeCompile']
    artifactPath = 'native/nativeCompile/native-3.0-smoketest'
    sysProperty = 'datadog.smoketest.spring.native.executable'
    buildArguments.addAll('--max-workers=4', '-Pprofiler=true')
    environment.put('GRAALVM_HOME', graalvmHome)
    environment.put('DD_TRACE_METHODS', 'datadog.smoketest.springboot.controller.WebController[sayHello]')
    environment.put('NATIVE_IMAGE_DEPRECATED_BUILDER_SANITATION', 'true')
  }
  projectJar('apiJar', project(':dd-trace-api'))
  projectJar('agentPath', project(':dd-java-agent'), 'shadow')
}

tasks.named('springNativeBuild') {
  onlyIf("Requires -PtestJvm=graalvm<N> (N >= 17)") { isSupportedGraalvm }
}

tasks.named('compileTestGroovy', GroovyCompile) {
  dependsOn 'springNativeBuild'
  onlyIf { isSupportedGraalvm }
  outputs.upToDateWhen {
    !tasks.named('springNativeBuild').get().didWork
  }
}

tasks.withType(Test).configureEach {
  // Keep the tests tied to the explicit GraalVM selection used to build the native
  // executable. Without this, `testJvmConstraints` may allow the Test task when the
  // daemon itself is native-image capable, even though `springNativeBuild` was skipped.
  onlyIf("Requires -PtestJvm=graalvm<N> (N >= 17)") { isSupportedGraalvm }
  // The test JVM is only a harness that starts the native executable, so run it with
  // the default project toolchain instead of the selected GraalVM.
  javaLauncher = javaToolchains.launcherFor(java.toolchain)
  jvmArgs "-Ddd.profiling.enabled=true"
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
