import datadog.gradle.plugin.HostPlatform
import org.gradle.playframework.tasks.RoutesCompile
import org.gradle.playframework.tasks.internal.RoutesCompileWorkAction
import org.gradle.playframework.tools.internal.routes.DefaultRoutesCompileSpec
import org.gradle.playframework.tools.internal.routes.RoutesCompilerFactory

plugins {
  id 'org.gradle.playframework'
}

apply from: "$rootDir/gradle/java.gradle"

testJvmConstraints {
  // TODO Java 17: This version of play doesn't support Java 17
  maxJavaVersion = JavaVersion.VERSION_15
}

apply from: "$rootDir/dd-smoke-tests/play-common/fix-play-routes.gradle"

def playVer = "2.4.11"
def scalaVer = System.getProperty("scala.binary.version", /* default = */ "2.11")

play {
  platform {
    playVersion = playVer
    scalaVersion = scalaVer
    javaVersion = JavaVersion.VERSION_1_8
  }
  injectedRoutesGenerator = true
}

distributions {
  main {
    contents {
      from("conf") {
        into "conf"
      }
    }
  }
}

repositories {
  mavenLocal()
  if (project.rootProject.hasProperty("mavenRepositoryProxy")) {
    maven {
      url project.rootProject.property("mavenRepositoryProxy")
      allowInsecureProtocol = true
    }
  }
  mavenCentral()
  maven {
    name = "lightbend-maven-releases"
    url = "https://repo.lightbend.com/lightbend/maven-release"
  }
  ivy {
    name = "lightbend-ivy-release"
    url = "https://repo.lightbend.com/lightbend/ivy-releases"
    layout("ivy")
  }
}

description = 'Play 2.4 Integration Tests.'

dependencies {
  implementation "com.typesafe.play:filters-helpers_$scalaVer:$playVer"
  implementation "com.typesafe.play:play-java-ws_$scalaVer:$playVer"
  // jaxb is not there anymore in java11+
  implementation "javax.xml.bind:jaxb-api:2.3.1"

  implementation group: 'io.opentracing', name: 'opentracing-api', version: '0.32.0'
  implementation group: 'io.opentracing', name: 'opentracing-util', version: '0.32.0'

  testImplementation project(':dd-smoke-tests')
  testImplementation project(':dd-smoke-tests:appsec')
  testImplementation(testFixtures(project(":dd-smoke-tests:iast-util")))
}

configurations.testImplementation {
  exclude group:'com.typesafe.play', module:"play-test_$scalaVer"
}

tasks.named("compileTestGroovy", GroovyCompile) {
  dependsOn 'stageMainDist'
  outputs.upToDateWhen {
    !stageMainDist.didWork
  }
}

tasks.withType(ScalaCompile).configureEach {
  // Despite the compatibility matrix, scala compiler doesn't properly
  // get the right compiler flags with JDK11 toolchain. Using 8 works.
  // * https://docs.scala-lang.org/overviews/jdk-compatibility/overview.html
  // * https://github.com/gradle/gradle/issues/19456
  configureCompiler(it, 8)
}

tasks.withType(AbstractCopyTask).configureEach {
  // Don't know why the play plugin tries to copy the logback.xml file twice, but only accept it once
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

if (HostPlatform.isLinuxArm64()) {
  tasks.named("compilePlayRoutes", RoutesCompile) { RoutesCompile task ->
    // org.gradle.playframework.tasks.RoutesCompile does not expose worker fork options, but its
    // worker JVM needs CDS disabled on Linux arm64 like the other forked JVMs in this build.
    def workerExecutorField = RoutesCompile.getDeclaredField("workerExecutor")
    workerExecutorField.accessible = true

    task.actions.clear()
    task.doLast {
      def spec = new DefaultRoutesCompileSpec(
        task.source.files,
        task.outputDirectory.get().asFile,
        task.javaProject,
        task.namespaceReverseRouter.get(),
        task.generateReverseRoutes.get(),
        task.injectedRoutesGenerator.get(),
        task.additionalImports.get(),
        projectDir
        )

      def workerExecutor = workerExecutorField.get(task)
      workerExecutor.processIsolation { workerSpec ->
        workerSpec.forkOptions { options ->
          options.jvmArgs("-XX:MaxMetaspaceSize=256m", "-Xshare:off")
        }
        workerSpec.classpath.from(task.routesCompilerClasspath)
      }.submit(RoutesCompileWorkAction) { parameters ->
        parameters.compiler.set(RoutesCompilerFactory.create(task.platform.get()))
        parameters.spec.set(spec)
      }
    }
  }
}

spotless {
  java {
    target "**/*.java"
  }
  scala {
    target "**/*.scala"
  }
}
