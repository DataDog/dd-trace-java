plugins {
  id 'dd-trace-java.smoke-test-app'
}

apply from: "$rootDir/gradle/java.gradle"

description = 'Open Feature provider Smoke Tests.'

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_11
}

smokeTestApp {
  gradleApp {
    taskName = 'bootJar'
    artifactPath = 'libs/openfeature-smoketest.jar'
    sysProperty = 'datadog.smoketest.springboot.shadowJar.path'
  }
  projectJar('featureFlaggingApiJar', project(':products:feature-flagging:feature-flagging-api'))
}

dependencies {
  testImplementation project(':dd-smoke-tests')
  testImplementation project(':products:feature-flagging:feature-flagging-lib')
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
