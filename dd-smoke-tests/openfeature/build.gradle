plugins {
  id 'com.gradleup.shadow'
  id 'java'
  id 'io.spring.dependency-management' version '1.1.6'
}

ext['spring-boot.version'] = '2.7.15'
ext.springBootMainClass = 'datadog.smoketest.springboot.SpringbootApplication'

apply from: "$rootDir/gradle/java.gradle"
apply from: "$rootDir/gradle/spring-boot-plugin.gradle"
apply from: "$rootDir/gradle/spring-boot-fatjar.gradle"
description = 'Open Feature provider Smoke Tests.'

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_11
}

tasks.named("compileJava", JavaCompile) {
  configureCompiler(it, 11, JavaVersion.VERSION_11)
}

dependencies {
  implementation project(':products:feature-flagging:feature-flagging-api')
  implementation 'org.springframework.boot:spring-boot-starter-web'

  testImplementation project(':dd-smoke-tests')
  testImplementation project(':products:feature-flagging:feature-flagging-lib')
}

tasks.withType(Test).configureEach {
  def shadowJarTask = tasks.named('shadowJar')
  dependsOn shadowJarTask
  jvmArgumentProviders.add(new CommandLineArgumentProvider() {
      @Override
      Iterable<String> asArguments() {
        return shadowJarTask.map { ["-Ddatadog.smoketest.springboot.shadowJar.path=${it.archiveFile.get()}"] }.get()
      }
    })
}
