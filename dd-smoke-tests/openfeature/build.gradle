apply from: "$rootDir/gradle/java.gradle"

description = 'Open Feature provider Smoke Tests.'

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_11
}

def appDir = "$projectDir/application"
def appBuildDir = "$buildDir/application"
def isWindows = System.getProperty("os.name").toLowerCase().contains("win")
def gradlewCommand = isWindows ? 'gradlew.bat' : 'gradlew'

tasks.register('bootJar', Exec) {
  workingDir appDir
  environment += [
    "GRADLE_OPTS": "-Dorg.gradle.jvmargs='-Xmx512M'",
    "JAVA_HOME": getLazyJavaHomeFor(11)
  ]
  commandLine "$appDir/${gradlewCommand}", "bootJar", "--no-daemon", "--max-workers=4", "-PappBuildDir=$appBuildDir",
    "-PfeatureFlaggingApiJar=${project(':products:feature-flagging:feature-flagging-api').tasks.jar.archiveFile.get()}"

  outputs.cacheIf { true }

  outputs.dir(appBuildDir)
    .withPropertyName("applicationJar")

  inputs.files(fileTree(appDir) {
    include '**/*'
    exclude '.gradle/**'
  })
  .withPropertyName("application")
  .withPathSensitivity(PathSensitivity.RELATIVE)
}

tasks.named('bootJar', Exec) {
  dependsOn project(':products:feature-flagging:feature-flagging-api').tasks.named('jar')
}

dependencies {
  testImplementation project(':dd-smoke-tests')
  testImplementation project(':products:feature-flagging:feature-flagging-lib')
}

tasks.withType(Test).configureEach {
  dependsOn 'bootJar'
  jvmArgumentProviders.add(new CommandLineArgumentProvider() {
      @Override
      Iterable<String> asArguments() {
        return ["-Ddatadog.smoketest.springboot.shadowJar.path=$appBuildDir/libs/openfeature-smoketest.jar"]
      }
    })
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
