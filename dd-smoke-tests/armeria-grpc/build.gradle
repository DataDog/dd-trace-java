plugins {
  id 'dd-trace-java.smoke-test-app'
  id 'com.google.protobuf' version '0.10.0'
}

apply from: "$rootDir/gradle/java.gradle"

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_17
}

description = 'Armeria gRPC Smoke Tests.'

sourceSets {
  main {
    proto {
      // In addition to the default 'src/main/proto'
      srcDir 'application/src/main/proto'
    }
  }
}

protobuf {
  // Configure the protoc executable.
  protoc {
    // Download from the repository.
    artifact = 'com.google.protobuf:protoc:3.22.3'
  }

  // Locate the codegen plugins.
  plugins {
    // Locate a plugin with name 'grpc'.
    grpc {
      // Download from the repository.
      artifact = 'io.grpc:protoc-gen-grpc-java:1.56.0'
    }
  }
  generateProtoTasks {
    ofSourceSet('main').configureEach {
      plugins { grpc {} }
    }
  }
}

smokeTestApp {
  gradleApp {
    taskName = 'armeriaBuild'
    nestedTasks = ['build']
    artifactPath = 'libs/armeria-smoketest-all.jar'
    sysProperty = 'datadog.smoketest.armeria.uberJar.path'
  }
  projectJar('apiJar', project(':dd-trace-api'))
}

dependencies {
  testImplementation project(':dd-smoke-tests')

  implementation 'io.grpc:grpc-protobuf:1.56.0'
  implementation 'io.grpc:grpc-stub:1.56.0'
  testRuntimeOnly 'io.grpc:grpc-netty-shaded:1.56.0'
  testCompileOnly 'org.apache.tomcat:annotations-api:6.0.53' // necessary for Java 9+
  testImplementation(testFixtures(project(":dd-smoke-tests:iast-util")))
}

tasks.named("compileTestGroovy", GroovyCompile) {
  dependsOn 'armeriaBuild'
  outputs.upToDateWhen {
    !tasks.named('armeriaBuild').get().didWork
  }
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
