plugins {
  id 'dd-trace-java.smoke-test-app'
  id 'java-test-fixtures'
}

apply from: "$rootDir/gradle/java.gradle"

description = 'SpringBoot Velocity Smoke Tests.'

smokeTestApp {
  gradleApp {
    taskName = 'bootJar'
    artifactPath = 'libs/springboot-velocity-smoketest.jar'
    sysProperty = 'datadog.smoketest.springboot.shadowJar.path'
  }
}

dependencies {
  testImplementation project(':dd-smoke-tests')
  testImplementation(testFixtures(project(":dd-smoke-tests:iast-util")))
}

// XssController loads templates from the filesystem at "resources/main/templates" relative to
// the test JVM's working directory (this module's build dir). Mirror the nested app's
// processed resources so that path resolves at runtime.
def applicationResourcesProvider = layout.buildDirectory.dir("application/resources/main")
tasks.register('copyAppResources', Copy) {
  dependsOn 'bootJar'
  from applicationResourcesProvider
  into layout.buildDirectory.dir("resources/main")
}

// `java.gradle` applies the `java` plugin so an empty `jar` task is created with
// `build/resources/main` as one of its inputs. Wire the dependency so Gradle knows
// `copyAppResources` writes there.
tasks.named('jar') {
  dependsOn 'copyAppResources'
}

tasks.withType(Test).configureEach {
  dependsOn 'copyAppResources'
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
