apply from: "$rootDir/gradle/java.gradle"

description = 'Spring Boot 2.7 Webflux Smoke Tests.'

dependencies {
  testImplementation project(':dd-smoke-tests')
}

def appDir = "$projectDir/application"
def appBuildDir = "$buildDir/application"
def isWindows = System.getProperty("os.name").toLowerCase().contains("win")
def gradlewCommand = isWindows ? 'gradlew.bat' : 'gradlew'

// define the task that builds the project via a sub-Gradle invocation.
//
// The sub-build inherits this project's wrapper (Gradle 9.4.1), whose daemon
// requires JDK 17 — that's why JAVA_HOME is 17, not the test runtime version.
// The application's compile target is pinned separately in
// application/build.gradle so the produced jar still loads on Java 11
// (which `-PtestJvm=11` selects).
//
// We invoke `shadowJar`, not `bootJar`: Spring Boot 3.x's plugin (the only one
// compatible with Gradle 9) packs a Java-17 JarLauncher into the bootJar, so
// the produced jar wouldn't start under Java 11. shadowJar produces a
// loader-free flat jar.
tasks.register('webfluxBuild', Exec) {
  workingDir "$appDir"
  environment += [
    "GRADLE_OPTS": "-Dorg.gradle.jvmargs='-Xmx512M'",
    "JAVA_HOME": getLazyJavaHomeFor(17)
  ]
  commandLine "$rootDir/${gradlewCommand}", "shadowJar", "--no-daemon", "--max-workers=4", "-PappBuildDir=$appBuildDir", "-PapiJar=${project(':dd-trace-api').tasks.jar.archiveFile.get()}"

  outputs.cacheIf { true }

  outputs.dir(appBuildDir)
    .withPropertyName("applicationJar")

  inputs.files(fileTree(appDir) {
    include '**/*'
    exclude '.gradle/**'
  })
  .withPropertyName("application")
  .withPathSensitivity(PathSensitivity.RELATIVE)
}

tasks.named("webfluxBuild", Exec) {
  dependsOn project(':dd-trace-api').tasks.named("jar")
}

tasks.named("compileTestGroovy", GroovyCompile) {
  dependsOn 'webfluxBuild'
  outputs.upToDateWhen {
    !tasks.named('webfluxBuild').get().didWork
  }
}

tasks.withType(Test).configureEach {
  jvmArgs "-Ddatadog.smoketest.webflux.uberJar.path=$appBuildDir/libs/webflux-2.7-smoketest-all.jar"
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
