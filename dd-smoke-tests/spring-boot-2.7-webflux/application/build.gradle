import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar
import com.github.jengelman.gradle.plugins.shadow.transformers.PropertiesFileTransformer

plugins {
  id 'java'
  id 'com.gradleup.shadow' version '8.3.9'
  id 'io.spring.dependency-management' version '1.1.6'
}

def sharedRootDir = "$rootDir/../../../"
def sharedConfigDirectory = "$sharedRootDir/gradle"
rootProject.ext.sharedConfigDirectory = sharedConfigDirectory

apply from: "$sharedConfigDirectory/repositories.gradle"

if (hasProperty('appBuildDir')) {
  layout.buildDirectory.set(file(property('appBuildDir') as String))
}

ext['spring-boot.version'] = '2.7.4'

dependencyManagement {
  imports {
    mavenBom "org.springframework.boot:spring-boot-dependencies:${project.ext['spring-boot.version']}"
  }
}

version = ""

java {
  sourceCompatibility = JavaVersion.VERSION_11
  targetCompatibility = JavaVersion.VERSION_11
}

dependencies {
  implementation 'org.springframework.boot:spring-boot-starter-webflux'
  implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
  implementation group: 'com.h2database', name: 'h2', version: '2.1.214'
  compileOnly group:"com.google.code.findbugs", name:"jsr305", version:"3.0.2"

  if (hasProperty('apiJar')) {
    implementation files(property('apiJar'))
  } else {
    implementation "com.datadoghq:dd-trace-api:0.110.0"
  }
}

tasks.named("jar", Jar) {
  manifest {
    attributes('Main-Class': 'datadog.smoketest.springboot.SpringbootApplication')
  }
}

tasks.named("shadowJar", ShadowJar) {
  manifest {
    attributes('Main-Class': 'datadog.smoketest.springboot.SpringbootApplication')
  }
  configurations = [project.configurations.runtimeClasspath]
  mergeServiceFiles()
  append 'META-INF/spring.handlers'
  append 'META-INF/spring.schemas'
  append 'META-INF/spring.tooling'
  append 'META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports'
  transform(PropertiesFileTransformer) {
    paths = ['META-INF/spring.factories']
    mergeStrategy = "append"
  }
}
