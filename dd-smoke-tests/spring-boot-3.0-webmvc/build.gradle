plugins {
  id 'dd-trace-java.smoke-test-app'
}

apply from: "$rootDir/gradle/java.gradle"

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_17
}

description = 'Spring Boot 3.0 WebMvc Smoke Tests.'

smokeTestApp {
  gradleApp {
    taskName = 'webmvcBuild30'
    nestedTasks = ['bootJar']
    artifactPath = 'libs/webmvc-3.0-smoketest.jar'
    sysProperty = 'datadog.smoketest.springboot.uberJar.path'
  }
  projectJar('apiJar', project(':dd-trace-api'))
}

dependencies {
  testImplementation project(':dd-smoke-tests')
}

tasks.named("compileTestGroovy", GroovyCompile) {
  dependsOn 'webmvcBuild30'
  outputs.upToDateWhen {
    !tasks.named('webmvcBuild30').get().didWork
  }
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
