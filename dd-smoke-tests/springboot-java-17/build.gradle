plugins {
  id 'dd-trace-java.smoke-test-app'
  id 'dd-trace-java.module.smoke-test'
  id 'java-test-fixtures'
}

description = 'SpringBoot Java 17 Smoke Tests.'

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_17
}

smokeTestApp {
  application {
    taskName = 'bootJar'
    artifactPath = 'libs/springboot-java-17-smoketest.jar'
    sysProperty = 'datadog.smoketest.springboot.shadowJar.path'
  }
  projectJar('iastUtil17Jar', project(':dd-smoke-tests:iast-util:iast-util-17'))
}

dependencies {
  testImplementation project(':dd-smoke-tests')
  testImplementation testFixtures(project(":dd-smoke-tests:iast-util:iast-util-17"))
  testImplementation testFixtures(project(':dd-smoke-tests:iast-util'))
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}
