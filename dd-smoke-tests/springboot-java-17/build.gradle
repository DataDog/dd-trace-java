import org.springframework.boot.gradle.tasks.bundling.BootJar

plugins {
  id 'java'
  id 'org.springframework.boot' version '3.3.5'
  id 'io.spring.dependency-management' version '1.0.15.RELEASE'
  id 'java-test-fixtures'
}

// Spring Boot 2.7.x is the last 2.x line whose spring-asm understands Java 17
// class files (major 61). Required because the application sources are
// compiled with target 17 (see configureCompiler below) but the Spring Boot
// Gradle plugin 3.3.5 BOM is overridden here to keep the runtime on the 2.x
// line for instrumentation coverage.
ext['spring-boot.version'] = '2.7.15'

apply from: "$rootDir/gradle/java.gradle"

testJvmConstraints {
  minJavaVersion = JavaVersion.VERSION_17
}

apply from: "$rootDir/gradle/spring-boot-plugin.gradle"
description = 'SpringBoot Java 17 Smoke Tests.'

dependencies {
  implementation group: 'org.springframework.boot', name: 'spring-boot-starter-web', version: '2.2.0.RELEASE'

  testImplementation project(':dd-smoke-tests')
  testImplementation testFixtures(project(":dd-smoke-tests:iast-util:iast-util-17"))
  testImplementation testFixtures(project(':dd-smoke-tests:iast-util'))

  implementation project(':dd-smoke-tests:iast-util:iast-util-17')
}

tasks.named("compileJava", JavaCompile) {
  configureCompiler(it, 17, JavaVersion.VERSION_17)
}

tasks.withType(Test).configureEach {
  dependsOn "bootJar"
  def bootJarTask = tasks.named('bootJar', BootJar)
  jvmArgumentProviders.add(new CommandLineArgumentProvider() {
      @Override
      Iterable<String> asArguments() {
        return bootJarTask.map { ["-Ddatadog.smoketest.springboot.shadowJar.path=${it.archiveFile.get()}"] }.get()
      }
    })
}
