import datadog.buildlogic.smoketest.NestedGradleBuild

plugins {
  id 'dd-trace-java.smoke-test-app'
  id 'dd-trace-java.mass'
}

ext {
  serverName = 'wildfly'
  //serverModule = 'servlet'
  serverModule = 'wildfly'
  serverVersion = '26.1.3.Final'
  serverExtension = 'zip'
}

repositories {
  ivy {
    url = mass.artifactUrl('github.com/wildfly/wildfly/releases/download/')
    // Restrict this repository to WildFly distribution artifacts only.
    // Without this filter, Gradle may probe this host for unrelated dependencies
    // (for example JUnit/Mockito), which makes the build flaky when the host is unreachable.
    content {
      includeGroup 'wildfly'
    }
    patternLayout {
      // GitHub release assets are published under /<version>/wildfly-<version>.zip
      // while the dependency coordinates keep the "wildfly" group/module.
      artifact '/[revision]/[module]-[revision].[ext]'
    }
    metadataSources {
      it.artifact()
    }
  }
}

apply from: "$rootDir/gradle/java.gradle"

testJvmConstraints {
  maxJavaVersion = JavaVersion.VERSION_11
}

description = 'Wildfly Smoke Tests.'

configurations {
  register('serverFile') {
    extendsFrom implementation
    canBeResolved = true
  }
}

dependencies {
  // Uses the ivy repository url to download the WildFly server zip.
  // organisation = serverName, module = serverModule, revision = serverVersion, ext = serverExtension
  serverFile "${serverName}:${serverModule}:${serverVersion}@${serverExtension}"
  testImplementation project(':dd-smoke-tests:rum')
  testImplementation project(':dd-smoke-tests')
}

def appBuildDir = layout.buildDirectory.dir("rm-ear")
evaluationDependsOn(':dd-trace-api')
def apiJarTask = project(':dd-trace-api').tasks.named('jar')

// Run the nested EAR build through the Gradle Tooling API.
tasks.register('earBuild', NestedGradleBuild) {
  applicationDir = layout.projectDirectory.dir("rum-ear")
  applicationBuildDir = appBuildDir
  tasksToRun = ['assemble']
  projectJar('apiJar', apiJarTask.flatMap { it.archiveFile })
  dependsOn apiJarTask
}

tasks.named("compileTestGroovy", GroovyCompile) {
  dependsOn 'earBuild'
  outputs.upToDateWhen {
    !tasks.named('earBuild').get().didWork
  }
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}

tasks.register("unzip", Copy) {
  dependsOn 'earBuild'
  mustRunAfter 'compileTestGroovy'
  def zipFileNamePrefix = "wildfly"

  def serverZipTree = providers.provider {
    // eager access
    def zipPath = project.configurations.serverFile.find {
      it.name.startsWith(zipFileNamePrefix)
    }
    if (zipPath == null) {
      throw new GradleException("Can't find server zip file that starts with: " + zipFileNamePrefix)
    }
    zipTree(zipPath)
  }

  from serverZipTree
  into layout.buildDirectory

  // When tests are disabled this would still be run, so disable this manually
  onlyIf { !project.rootProject.hasProperty("skipTests") }
}

tasks.withType(Jar).configureEach {
  dependsOn 'unzip'
}

def wildflyDir = "${buildDir}/${serverName}-${serverVersion}"

tasks.register("deploy", Copy) {
  dependsOn 'unzip', 'earBuild'
  from appBuildDir.map { it.file("libs/wildfly-rum-ear-smoketest.ear") }
  into "${wildflyDir}/standalone/deployments"
}

tasks.withType(Test).configureEach {
  dependsOn 'deploy'
  jvmArgs "-Ddatadog.smoketest.wildflyDir=${wildflyDir}"
}
