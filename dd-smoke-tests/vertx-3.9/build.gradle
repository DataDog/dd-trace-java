plugins {
  id 'dd-trace-java.smoke-test-app'
  id 'idea'
}

apply from: "$rootDir/gradle/java.gradle"

description = 'Vert.x 3.9 Smoke Tests.'

smokeTestApp {
  gradleApp {
    taskName = 'vertxBuild'
    nestedTasks = ['assemble']
    artifactPath = 'libs/vertx-3.9-1.0.0-SNAPSHOT-fat.jar'
    sysProperty = 'datadog.smoketest.vertx.uberJar.path'
  }
  projectJar('apiJar', project(':dd-trace-api'))
}

dependencies {
  testImplementation project(':dd-smoke-tests')
  testImplementation(testFixtures(project(":dd-smoke-tests:iast-util")))
}

tasks.named("compileTestGroovy", GroovyCompile) {
  dependsOn 'vertxBuild'
  outputs.upToDateWhen {
    !tasks.named('vertxBuild').get().didWork
  }
}

spotless {
  java {
    target "**/*.java"
  }

  groovyGradle {
    target '*.gradle', "**/*.gradle"
  }
}

idea {
  module {
    excludeDirs += [file("$projectDir/application")]
  }
}
