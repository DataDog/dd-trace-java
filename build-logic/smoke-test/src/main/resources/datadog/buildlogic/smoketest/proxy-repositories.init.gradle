import org.gradle.api.initialization.resolve.RepositoriesMode

beforeSettings { settings ->
  def gradlePluginProxy = settings.providers.gradleProperty("gradlePluginProxy").orNull
  def mavenRepositoryProxy = settings.providers.gradleProperty("mavenRepositoryProxy").orNull

  settings.pluginManagement {
    repositories {
      mavenLocal()
      if (gradlePluginProxy) {
        maven {
          url = settings.uri(gradlePluginProxy)
          allowInsecureProtocol = true
        }
      }
      if (mavenRepositoryProxy) {
        maven {
          url = settings.uri(mavenRepositoryProxy)
          allowInsecureProtocol = true
        }
      }
      gradlePluginPortal()
      mavenCentral()
    }
  }

  settings.dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
      mavenLocal()
      if (mavenRepositoryProxy) {
        maven {
          url = settings.uri(mavenRepositoryProxy)
          allowInsecureProtocol = true
        }
      }
      mavenCentral()
    }
  }
}
